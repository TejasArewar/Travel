<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense - Travel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            margin: -20px -20px 20px -20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .navbar h1 {
            font-size: 20px;
        }
        
        .back-btn {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            background: #34495e;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .back-btn:hover {
            background: #2c3e50;
        }
        
        .form-container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        input:focus {
            outline: none;
            border-color: #3498db;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .submit-btn {
            background: #27ae60;
            color: white;
        }
        
        .submit-btn:hover {
            background: #229954;
        }
        
        .cancel-btn {
            background: #95a5a6;
            color: white;
        }
        
        .cancel-btn:hover {
            background: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Add Expense</h1>
        <a href="{% url 'home' %}" class="back-btn">Back to Home</a>
    </div>
    
    <div class="form-container">
        <h2>Add New Expense</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="spent_on">Spent On</label>
                <input type="text" id="spent_on" name="spent_on" required>
            </div>
            
            <div class="form-group">
                <label for="amount_spent">Amount (₹)</label>
                <input type="number" id="amount_spent" name="amount_spent" step="0.01" required>
            </div>
            
            <div class="btn-group">
                <button type="submit" class="submit-btn">Add Expense</button>
                <button type="button" class="cancel-btn" onclick="goHome()">Cancel</button>
            </div>
        </form>
    </div>
    
    <script>
        function goHome() {
            window.location.href = '{% url "home" %}';
        }
    </script>
</body>
</html>
